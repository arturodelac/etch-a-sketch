<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-A-Sketch</title>
    <link rel="stylesheet" href="style.css">
    <script src="javascript.js" defer></script>
    
</head>
<body>
    <header><h1 class = "header">Etch-A-Sketch</h1></header>
    <div class="ui">
        <div class="buttons-container">
            <button class="button" id="color-mode">Color mode</button>
            <button class="button" id="rainbow-mode">Rainbow mode</button>
            <button class="button"id="eraser">Eraser</button>
            <button class="button"id="clear">Clear</button>
        </div>
        <div class="grid-container"></div>
        <div class="color-picker"></div>
    
    </div>

    <div class="slider-big-container">
        <h2 class="grid-size">16x16</h2>
    <div class="slider-data"></div>
    <div class="slidecontainer">
        <input type="range" min="1" max="100" value="50" class="slider" id="myRange">
      </div>
    </div>
      
</body>
</html>
